name: C++ CI

on:
  push:
  pull_request:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      exercises: ${{ steps.list.outputs.exercises }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover ex* folders
        id: list
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dirs=(ex*/)
          if [[ ${#dirs[@]} -eq 0 ]]; then
            echo "No ex* directories found at repository root."
            exit 1
          fi

          json="[]"
          for dir in "${dirs[@]}"; do
            if [[ -f "${dir}Makefile" || -f "${dir}makefile" ]]; then
              name="${dir%/}"
              json=$(jq -c --arg d "$name" '. + [$d]' <<< "$json")
            fi
          done

          if [[ "$json" == "[]" ]]; then
            echo "Found ex* directories, but none contain a Makefile."
            exit 1
          fi

          echo "exercises=$json" >> "$GITHUB_OUTPUT"
          echo "Detected exercises: $json"

  build-and-valgrind:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        exercise: ${{ fromJson(needs.discover.outputs.exercises) }}

    name: Valgrind ${{ matrix.exercise }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Build and run Valgrind
        shell: bash
        run: |
          set -euo pipefail

          exercise="${{ matrix.exercise }}"
          makefile="$exercise/Makefile"
          if [[ ! -f "$makefile" ]]; then
            makefile="$exercise/makefile"
          fi

          binary_name=$(awk -F '=' '/^NAME[[:space:]]*=/{gsub(/[[:space:]]/,"",$2); print $2; exit}' "$makefile")
          if [[ -z "$binary_name" ]]; then
            echo "Could not extract NAME from $makefile"
            exit 1
          fi

          make -C "$exercise"

          binary_path="$exercise/$binary_name"
          if [[ ! -x "$binary_path" ]]; then
            echo "Binary not found or not executable: $binary_path"
            ls -la "$exercise"
            exit 1
          fi

          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --error-exitcode=1 \
            "$binary_path"
